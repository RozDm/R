name: Repair D1 (one-shot)

# The metrics D1 hit a Cloudflare-side storage failure around 2026-06-29
# ("Internal error while starting up D1 DB storage caused object to be
# reset") — every query fails while the API still lists the database.
# Drives recovery from Actions since wrangler can't run locally:
#   info     — Time Travel + probe query, pure diagnosis, changes nothing
#   restore  — Time Travel restore to `timestamp` (D1 bookmarks the current
#              state first, so this is reversible)
#   recreate — LAST RESORT: delete + create + schema. Prints the NEW
#              database_id, which must then be wired into wrangler.jsonc
#              (+ `npm run cf-typegen`) and deployed. Requires typing
#              RECREATE in `confirm`.
#   create   — create + schema WITHOUT any existence check or delete.
#              Escape hatch for the ghost-entry state the 2026-07-03 outage
#              left behind: `d1 list` still returns the deleted database, so
#              bootstrap's "already exists" grep skips creation while every
#              call against the listed uuid 7404s. `name` overrides the
#              database name if the ghost keeps the default locked.
#   sql      — run the single statement from `sql` against the database.
#              For surgical one-off fixes (e.g. decrementing a counter a
#              diagnostic probe inflated) where reset-metrics is too blunt.
#              Dispatch requires write access, same as every mode here.
on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'info | restore | recreate | create | sql'
        required: true
        default: 'info'
      timestamp:
        description: 'restore mode: UTC ISO timestamp, e.g. 2026-06-29T06:00:00Z'
        required: false
        default: ''
      confirm:
        description: 'recreate mode: type RECREATE to confirm'
        required: false
        default: ''
      name:
        description: 'create mode: database name to create'
        required: false
        default: 'rozsoshnykh-metrics-v2'
      sql:
        description: 'sql mode: single SQL statement to execute'
        required: false
        default: ''

jobs:
  repair:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      DB: rozsoshnykh-metrics-v2
      MODE: ${{ inputs.mode }}
      RESTORE_TS: ${{ inputs.timestamp }}
      CONFIRM: ${{ inputs.confirm }}
      CREATE_NAME: ${{ inputs.name }}
      SQL_CMD: ${{ inputs.sql }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      # Always runs, never fails the job: shows whether the control plane
      # (info/time-travel) responds and whether queries still error.
      - name: Probe current state
        run: |
          npx wrangler d1 info "$DB" || true
          npx wrangler d1 time-travel info "$DB" || true
          npx wrangler d1 execute "$DB" --remote --command "SELECT 1" || true

      - name: Time Travel restore
        if: env.MODE == 'restore'
        run: |
          if [ -z "$RESTORE_TS" ]; then
            echo "::error::restore mode needs the timestamp input"
            exit 1
          fi
          npx wrangler d1 time-travel restore "$DB" --timestamp "$RESTORE_TS"
          echo "--- verify ---"
          npx wrangler d1 execute "$DB" --remote --command "SELECT COUNT(*) AS geo_rows FROM geo"

      - name: Run one-off SQL
        if: env.MODE == 'sql'
        run: |
          if [ -z "$SQL_CMD" ]; then
            echo "::error::sql mode needs the sql input"
            exit 1
          fi
          npx wrangler d1 execute "$DB" --remote --command "$SQL_CMD"

      - name: Create fresh database + schema (no existence check)
        if: env.MODE == 'create'
        run: |
          NAME="${CREATE_NAME:-rozsoshnykh-metrics-v2}"
          npx wrangler d1 create "$NAME"
          npx wrangler d1 execute "$NAME" --remote --file=schema/metrics.sql
          echo "--- tables ---"
          npx wrangler d1 execute "$NAME" --remote \
            --command "SELECT name FROM sqlite_master WHERE type='table' ORDER BY name"
          echo "=================================================="
          echo "database_id for wrangler.jsonc (name: $NAME):"
          echo "=================================================="
          export N="$NAME"
          npx wrangler d1 list --json | python3 -c "import json,sys,os; [print(d['uuid'], d.get('created_at', '')) for d in json.load(sys.stdin) if d['name']==os.environ['N']]"

      - name: Recreate database (DESTRUCTIVE)
        if: env.MODE == 'recreate'
        run: |
          if [ "$CONFIRM" != "RECREATE" ]; then
            echo "::error::recreate mode needs confirm=RECREATE"
            exit 1
          fi
          npx wrangler d1 delete "$DB" --skip-confirmation
          npx wrangler d1 create "$DB"
          npx wrangler d1 execute "$DB" --remote --file=schema/metrics.sql
          echo "=================================================="
          echo "NEW database_id — update wrangler.jsonc, run"
          echo "'npm run cf-typegen', commit, and deploy:"
          echo "=================================================="
          npx wrangler d1 list --json | python3 -c "import json,sys; [print(d['uuid']) for d in json.load(sys.stdin) if d['name']=='rozsoshnykh-metrics-v2']"

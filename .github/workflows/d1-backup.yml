name: Backup D1

# Weekly off-platform snapshot of the metrics database. D1 Time Travel already
# covers the last 30 days of point-in-time restore on Cloudflare's side; this
# is the longer-horizon insurance — a downloadable SQL dump stored as a GitHub
# Actions artifact (free, retained 90 days). Manual trigger lets me grab one
# before a risky migration.
#
# The repo is public and workflow artifacts are downloadable by anyone with a
# GitHub account, so the dump (contact + subscribers PII) is gpg-encrypted with
# the BACKUP_PASSPHRASE repo secret before upload. Restore locally with:
#   gpg --decrypt --batch --pinentry-mode loopback \
#     --passphrase "$BACKUP_PASSPHRASE" metrics-<ts>.sql.gpg > metrics.sql
on:
  schedule:
    - cron: '0 4 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  # Lets the cleanup step delete the legacy plaintext artifacts.
  actions: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      # Purge any artifact from the era before encryption (named exactly
      # 'd1-metrics-backup' — the encrypted ones use a different name). Kept
      # as a permanent no-op safety net, and ordered before the passphrase
      # gate so even a misconfigured run still removes exposed PII.
      - name: Delete legacy plaintext artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner: context.repo.owner, repo: context.repo.repo, per_page: 100 },
            )
            for (const a of artifacts.filter((a) => a.name === 'd1-metrics-backup')) {
              core.info(`deleting plaintext artifact ${a.id} from ${a.created_at}`)
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: a.id,
              })
            }

      # Never fall back to uploading a readable dump: no passphrase, no backup.
      - name: Require BACKUP_PASSPHRASE
        env:
          BACKUP_PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
        run: |
          if [ -z "$BACKUP_PASSPHRASE" ]; then
            echo "::error::BACKUP_PASSPHRASE secret is not set — refusing to upload a plaintext dump"
            exit 1
          fi

      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Export D1 and encrypt
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          BACKUP_PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
        run: |
          mkdir -p backup
          ts=$(date -u +'%Y%m%dT%H%M%SZ')
          npx wrangler d1 export rozsoshnykh-metrics-v2 --remote --output "backup/metrics-${ts}.sql"
          # Passphrase over stdin (not argv) so it never shows in the process
          # list; loopback pinentry is required for batch-mode gpg 2.x.
          printf '%s' "$BACKUP_PASSPHRASE" | gpg --batch --symmetric \
            --cipher-algo AES256 --pinentry-mode loopback --passphrase-fd 0 \
            --output "backup/metrics-${ts}.sql.gpg" "backup/metrics-${ts}.sql"
          rm "backup/metrics-${ts}.sql"
          ls -lh backup/

      - uses: actions/upload-artifact@v4
        with:
          name: d1-metrics-backup-encrypted
          path: backup/*.sql.gpg
          retention-days: 90

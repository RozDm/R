name: Migrate subscribers table (one-shot)

# Applies the full schema/metrics.sql against the remote D1. All statements
# are CREATE TABLE / CREATE INDEX with IF NOT EXISTS, so re-running on a
# database that already has the older tables is safe and only adds the new
# `subscribers` table introduced for the newsletter sign-up.
on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Apply schema (idempotent)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 execute rozsoshnykh-metrics --remote --file=schema/metrics.sql

      - name: Verify subscribers table exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler d1 execute rozsoshnykh-metrics --remote \
            --command "SELECT name FROM sqlite_master WHERE type='table' AND name='subscribers';"

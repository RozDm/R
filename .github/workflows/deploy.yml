name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      # Same gate as predeploy: never ship a red build.
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - name: Build
        env:
          # Public Turnstile site key inlined into the bundle at build time;
          # empty string keeps the widget off, matching the worker gate.
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
        run: npm run build

      # Push runtime secrets before deploy so the new code sees them on the
      # next request. Each one is a no-op when the GH secret isn't configured.
      - name: Sync runtime secrets
        env:
          TURNSTILE_SECRET: ${{ secrets.TURNSTILE_SECRET }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          AE_API_TOKEN: ${{ secrets.AE_API_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          put_secret() {
            local name=$1 value=$2
            if [ -n "$value" ]; then
              printf '%s' "$value" | npx wrangler secret put "$name"
            else
              echo "$name not set — skipping"
            fi
          }
          put_secret TURNSTILE_SECRET "$TURNSTILE_SECRET"
          put_secret CF_ACCOUNT_ID    "$CF_ACCOUNT_ID"
          put_secret AE_API_TOKEN     "$AE_API_TOKEN"

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Smoke test (live site)
        run: bash scripts/smoke.sh

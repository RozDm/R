name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      # Same gate as predeploy: never ship a red build.
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - name: Build
        env:
          # Public Turnstile site key inlined into the bundle at build time;
          # empty string keeps the widget off, matching the worker gate.
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
        run: npm run build

      # Push the Turnstile secret to the worker before deploy, so the new
      # code sees it immediately. No-op when the secret isn't configured.
      - name: Sync Turnstile secret
        env:
          TURNSTILE_SECRET: ${{ secrets.TURNSTILE_SECRET }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$TURNSTILE_SECRET" ]; then
            printf '%s' "$TURNSTILE_SECRET" | npx wrangler secret put TURNSTILE_SECRET
          else
            echo "TURNSTILE_SECRET not set — skipping"
          fi

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Smoke test (live site)
        run: bash scripts/smoke.sh

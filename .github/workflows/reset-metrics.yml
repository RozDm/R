name: Reset metrics (DESTRUCTIVE)

# Manual-only admin tool. Wipes the D1 view + geo counters (NOT the contact
# table) so the public stats can start from a clean slate — e.g. dropping
# development noise before launch. The Analytics Engine time-series is
# append-only and immutable, so it is intentionally left untouched; its old
# points simply age out of the 24h/7d/30d windows on their own.
#
# Guarded by a confirm box: you must type RESET to run, so a stray click on
# "Run workflow" can't nuke the counters.
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type RESET to confirm wiping the view + geo counters'
        required: true
        default: ''

concurrency:
  group: reset-metrics
  cancel-in-progress: false

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        if: ${{ inputs.confirm != 'RESET' }}
        run: |
          echo "confirm was '${{ inputs.confirm }}', expected 'RESET' — aborting."
          exit 1

      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Counts before
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler d1 execute rozsoshnykh-metrics-v2 --remote \
            --command "SELECT 'views' AS table_name, COUNT(*) AS rows FROM views UNION ALL SELECT 'geo', COUNT(*) FROM geo;"

      - name: Wipe view + geo counters
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler d1 execute rozsoshnykh-metrics-v2 --remote \
            --command "DELETE FROM views; DELETE FROM geo;"

      - name: Counts after
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler d1 execute rozsoshnykh-metrics-v2 --remote \
            --command "SELECT 'views' AS table_name, COUNT(*) AS rows FROM views UNION ALL SELECT 'geo', COUNT(*) FROM geo;"

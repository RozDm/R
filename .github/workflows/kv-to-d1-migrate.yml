name: Migrate KV metrics to D1 (one-shot)

# Copies the legacy KV counters (geo JSON + views:<slug> keys) into the D1
# tables ADDITIVELY (count = count + migrated). Run exactly once, right
# after the D1 worker deploy — running it twice would double the legacy
# numbers.
on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Build migration SQL from KV
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          : > /tmp/migrate.sql

          # Geo: one JSON blob under the "geo" key.
          if npx wrangler kv key get geo --binding=STATUS --remote > /tmp/geo.json 2>/dev/null; then
            python3 - <<'EOF' >> /tmp/migrate.sql
          import json, re
          try:
              data = json.load(open('/tmp/geo.json'))
          except Exception:
              data = {}
          for code, n in (data.get('countries') or {}).items():
              if re.fullmatch(r'[A-Z]{2}', code) and code not in ('XX', 'T1') and isinstance(n, (int, float)) and n > 0:
                  print(f"INSERT INTO geo (country, count) VALUES ('{code}', {int(n)}) "
                        f"ON CONFLICT(country) DO UPDATE SET count = count + {int(n)};")
          EOF
          else
            echo "-- no geo key in KV" >> /tmp/migrate.sql
          fi

          # Views: every views:<slug> key.
          npx wrangler kv key list --binding=STATUS --remote > /tmp/keys.json
          python3 - <<'EOF' > /tmp/view-keys.txt
          import json, re
          for k in json.load(open('/tmp/keys.json')):
              name = k['name']
              if name.startswith('views:') and re.fullmatch(r'[a-z0-9][a-z0-9-]{0,63}', name[6:]):
                  print(name)
          EOF
          while read -r key; do
            slug="${key#views:}"
            n=$(npx wrangler kv key get "$key" --binding=STATUS --remote || echo 0)
            case "$n" in
              ''|*[!0-9]*) n=0 ;;
            esac
            if [ "$n" -gt 0 ]; then
              echo "INSERT INTO views (slug, count) VALUES ('$slug', $n) ON CONFLICT(slug) DO UPDATE SET count = count + $n;" >> /tmp/migrate.sql
            fi
          done < /tmp/view-keys.txt

          echo "--- migration SQL ---"
          cat /tmp/migrate.sql

      - name: Apply to D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 execute rozsoshnykh-metrics --remote --file=/tmp/migrate.sql

      - name: Show resulting tables
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler d1 execute rozsoshnykh-metrics --remote --command "SELECT * FROM geo ORDER BY count DESC"
          npx wrangler d1 execute rozsoshnykh-metrics --remote --command "SELECT * FROM views ORDER BY count DESC"

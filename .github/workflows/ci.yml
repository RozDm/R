name: CI

# deploy.yml already runs the same lint/typecheck/test/build gate on push to
# main, so we only need this workflow for PRs.
on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
